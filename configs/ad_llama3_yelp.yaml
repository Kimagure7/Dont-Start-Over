model:
  path: Llama-3.2-3B-Instruct
  soft_prompt_path: outputs/Yelp/Llama-3.2-1B-Instruct/checkpoint_model_best.pth
  prompt_path: prompts/yelp_title.txt
  freeze_lora: True
  freeze_predictor: false 
  max_txt_len: 256
  dropout: 0.1
  ckpt: 
  use_item_embedding: False # True: use item embedding, False: use item title
  ffn_matrix: 
  loss_file: 

dataset:
  name: Yelp
  train: datasets/Yelp/train_reviews_32k.csv
  valid: datasets/Yelp/valid_reviews_32k.csv
  user_dict: datasets/Yelp/user_dict.pickle
  train_ratio: 32850 
  mode: 0


run:
  seed: 42
  evaluate: False # False: training, True: only evaluation 
  output_dir: outputs
  device: cuda
  init_lr: 1e-4
  per_device_train_batch_size: 32
  per_device_eval_batch_size: 48
  max_epoch: 4
  resume_ckpt_path: null
  min_epoch: 1
  norm_lambda: 0.2 
  dataset_type: 'user' 
  lr_scheduler: cosine #"linear", "cosine", "cosine_with_restarts", "polynomial", "constant", "constant_with_warmup"
  num_warmup_steps: 0
  gradient_accumulation_steps: 1
  comment: 