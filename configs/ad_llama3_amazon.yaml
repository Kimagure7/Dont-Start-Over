model:
  path: Phi-3-mini-4k-instruct
  soft_prompt_path: outputs/MoviesAndTV/Llama-3.2-3B-Instruct/checkpoint_model_best.pth
  soft_prompt_path_2: # outputs/MoviesAndTV/Qwen2.5-3B-Instruct/checkpoint_model_best.pth 
  # soft_prompt_path_3: # outputs/MoviesAndTV/stablelm-2-1_6b-chat/checkpoint_model_best.pth need to modify code to support three soft prompts
  # soft_prompt_dim: 2048
  prompt_path: prompts/amazon_title.txt
  freeze_lora: True # deprecated
  freeze_predictor: false # True: freeze predictor, False: train predictor
  max_txt_len: 256
  dropout: 0.1
  ckpt: 
  use_item_embedding: False # True: use item embedding, False: use item title. deprecated

dataset:
  name: MoviesAndTV
  train: datasets/MoviesAndTV/train_data_30k.csv
  valid: datasets/MoviesAndTV/valid_data_30k.csv
  user_dict: datasets/MoviesAndTV/user_dict_30k.pickle # set null and run once if not exist
  train_ratio: 6000 # user num use for training
  mode: 0 # user select method for training, 0: random, 3: kmeans+var, change code if you want to use other methods, in datasets.py, get_train_indices

run:
  seed: 42
  evaluate: False # False: training, True: only evaluation 
  output_dir: outputs
  device: cuda
  init_lr: 1e-4
  per_device_train_batch_size: 32
  per_device_eval_batch_size: 64
  max_epoch: 4
  resume_ckpt_path: null # deprecated
  min_epoch: 1
  norm_lambda: 0.2 # use for normalization, lambda * celoss + (1 - lambda) * mse_loss
  dataset_type: 'user' # DO NOT CHANGE
  lr_scheduler: cosine #"linear", "cosine", "cosine_with_restarts", "polynomial", "constant", "constant_with_warmup"
  num_warmup_steps: 0
  gradient_accumulation_steps: 1
  comment:  # comment for this run
