model:
  path: /NAS/HuggingFaceModels/Llama-3.2-3B-Instruct
  prompt_path: prompts/yelp_title.txt
  freeze_lora: True
  max_txt_len: 256
  ckpt: 
  use_item_embedding: False 

dataset:
  name: Yelp
  train: datasets/Yelp/train_reviews_32k.csv
  valid: datasets/Yelp/valid_reviews_32k.csv
  user_dict: datasets/Yelp/user_dict.pickle

run:
  seed: 42
  evaluate: True # False: training, True: only evaluation 
  output_dir: outputs
  device: cuda
  init_lr: 8e-4
  per_device_train_batch_size: 48
  per_device_eval_batch_size: 96
  max_epoch: 15
  iters_per_epoch: 50 
  norm_lambda: 0.2
  log_interval: 200
  resume_ckpt_path: null
  min_epoch: 8
  lr_scheduler: cosine #"linear", "cosine", "cosine_with_restarts", "polynomial", "constant", "constant_with_warmup"
  num_warmup_steps: 0
  gradient_accumulation_steps: 1
  comment: 
